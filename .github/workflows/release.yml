name: release
on:
  push:
    tags: ['v*']
permissions:
  contents: write
jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: sudo apt-get update && sudo apt-get install -y libudev-dev pkg-config rpm zip
      - run: cargo build --release
      - run: scripts/package-deb.sh
      - run: scripts/package-rpm.sh
      - run: scripts/package-addon.sh
      - run: tar -C target/release -czf dist/last-airblender_linux_x86_64.tar.gz last-airblender
      - uses: actions/upload-artifact@v4
        with:
          name: linux-assets
          path: |
            dist/*.deb
            dist/*.rpm
            dist/*linux*.tar.gz
            dist/*addon*.zip
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: powershell -ExecutionPolicy Bypass -File scripts/package-windows-msi.ps1
      - uses: actions/upload-artifact@v4
        with:
          name: windows-assets
          path: dist/*.msi
  macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runs_on: macos-13
            arch_asset: x86_64
          - runs_on: macos-14
            arch_asset: arm64
    runs-on: ${{ matrix.runs_on }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release
      - run: ARCH_ASSET=${{ matrix.arch_asset }} scripts/package-macos-pkg.sh
      - run: tar -C target/release -czf dist/last-airblender_macos_${{ matrix.arch_asset }}.tar.gz last-airblender
      - uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch_asset }}-assets
          path: |
            dist/*.pkg
            dist/*macos*.tar.gz
  publish:
    runs-on: ubuntu-latest
    needs: [linux, windows, macos]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist-in
      - run: |
          mkdir -p dist
          find dist-in -maxdepth 3 -type f -exec cp {} dist/ \;
          scripts/checksums.sh
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
